<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fintrack AI | Dashboard Minimal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-600 font-sans min-h-screen p-4 md:p-8">

  <div id="login-section" class="flex min-h-[80vh] items-center justify-center hidden">
    <div class="bento-card p-10 w-full max-w-md bg-white border border-slate-200">
      <div class="text-center mb-8">
        <h2 class="text-3xl font-black text-slate-900 tracking-tighter uppercase">Fintrack<span class="text-cyan-500">.</span></h2>
        <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold mt-1">Acesso Seguro</p>
      </div>
      <div class="space-y-4">
        <input type="email" id="email-input" placeholder="E-mail" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-sm text-slate-900 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all" autocomplete="email" />
        <input type="password" id="password-input" placeholder="Senha" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-sm text-slate-900 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all" autocomplete="current-password" />
        <button id="login-btn" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold text-sm py-3 rounded-2xl transition-all mt-2 shadow-md">Autenticar</button>
        <div id="login-error" class="text-rose-500 text-xs font-bold text-center mt-2"></div>
      </div>
    </div>
  </div>

  <main id="dashboard-section" class="max-w-7xl mx-auto space-y-6 hidden">
    
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
      <div>
        <h1 class="text-2xl tracking-tighter uppercase flex items-center gap-2">
          <span class="font-black text-slate-900">FINTRACK</span> 
          <span class="text-slate-400 font-medium">AI</span>
          <span class="text-cyan-500 font-black">.</span>
        </h1>
        <p class="text-[10px] uppercase tracking-[0.2em] text-slate-400 font-bold mt-1">Painel de Controle Financeiro</p>
      </div>

      <div class="flex flex-wrap gap-3 items-center">
        <select id="month-select" class="bg-white border border-slate-200 rounded-2xl pl-4 pr-10 py-2 text-xs font-bold text-slate-600 uppercase focus:outline-none focus:border-cyan-500 cursor-pointer shadow-sm"></select>
        <select id="year-select" class="bg-white border border-slate-200 rounded-2xl pl-4 pr-10 py-2 text-xs font-bold text-slate-600 uppercase focus:outline-none focus:border-cyan-500 cursor-pointer shadow-sm"></select>
        <button id="btnAtualizar" class="p-2 bg-white border border-slate-200 rounded-2xl hover:bg-slate-100 text-slate-600 shadow-sm transition-colors"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
        <button id="btnLogout" class="px-4 py-2 bg-white border border-slate-200 text-slate-600 rounded-2xl text-xs font-bold uppercase hover:bg-slate-100 shadow-sm transition-colors">Sair</button>
      </div>
    </header>

    <div id="loading" class="text-center py-10 text-cyan-500 font-bold text-sm hidden animate-pulse">Sincronizando...</div>
    <div id="error" class="text-center py-10 text-rose-500 font-bold text-sm hidden"></div>

    <div id="content" class="space-y-6">
      
      <div class="bento-card bg-white p-4 md:px-8 flex flex-col md:flex-row gap-4 items-center justify-between border border-slate-200">
        <div class="flex items-center gap-2 w-full md:w-auto">
          <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center">
             <i data-lucide="plus" class="text-slate-600 w-4 h-4"></i>
          </div>
          <span class="text-xs font-bold uppercase tracking-wider text-slate-500">Lançamento</span>
        </div>
        <div class="flex flex-wrap md:flex-nowrap gap-3 w-full md:w-auto flex-1 md:justify-end">
          <input id="manual-title" placeholder="Descrição (ex: Mercado)" class="bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-xs text-slate-900 focus:outline-none focus:border-cyan-500 w-full md:w-auto flex-1 max-w-[200px]" />
          <input id="manual-amount" type="number" step="0.01" placeholder="R$ 0,00" class="bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-xs text-slate-900 focus:outline-none focus:border-cyan-500 w-full md:w-24" />
          <select id="manual-type" class="bg-slate-50 border border-slate-200 rounded-xl pl-4 pr-10 py-2 text-xs text-slate-900 focus:outline-none focus:border-cyan-500 w-full md:w-auto cursor-pointer">
            <option value="debit">Saída</option>
            <option value="credit">Entrada</option>
          </select>
          <button id="add-manual" class="bg-slate-900 hover:bg-slate-800 text-white font-bold uppercase text-[10px] px-6 py-2 rounded-xl transition-all w-full md:w-auto shadow-sm">Registrar</button>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bento-card p-8 flex flex-col justify-between min-h-[140px] bg-slate-900 border-transparent shadow-lg text-white">
          <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold">Saldo Atual</p>
          <h2 id="kpi-balance" class="text-4xl font-black tracking-tighter mt-2">R$ 0,00</h2>
        </div>
        
        <div class="bento-card p-6 flex flex-col justify-between min-h-[140px] bg-white border border-slate-200 shadow-sm">
          <div class="flex justify-between items-start">
            <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold">Entradas</p>
            <div class="p-2 bg-emerald-50 text-emerald-500 rounded-full">
               <i data-lucide="arrow-up-right" class="w-4 h-4"></i>
            </div>
          </div>
          <h2 id="kpi-income" class="text-3xl font-black text-slate-900 tracking-tighter">R$ 0,00</h2>
        </div>
        
        <div class="bento-card p-6 flex flex-col justify-between min-h-[140px] bg-white border border-slate-200 shadow-sm">
          <div class="flex justify-between items-start">
            <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold">Saídas</p>
            <div class="p-2 bg-rose-50 text-rose-500 rounded-full">
               <i data-lucide="arrow-down-right" class="w-4 h-4"></i>
            </div>
          </div>
          <h2 id="kpi-expenses" class="text-3xl font-black text-slate-900 tracking-tighter">R$ 0,00</h2>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
        
        <div class="md:col-span-8 bento-card bg-white border border-slate-200 p-6 flex flex-col h-[500px] shadow-sm">
          <div class="flex flex-col md:flex-row justify-between md:items-center gap-4 mb-6 pb-4 border-b border-slate-100">
            <h3 class="text-slate-900 font-black uppercase text-sm tracking-tighter">Atividade Recente</h3>
            <div class="flex gap-2">
              <button class="filter-btn active" data-filter="all">Todos</button>
              <button class="filter-btn" data-filter="credit">Entradas</button>
              <button class="filter-btn" data-filter="debit">Saídas</button>
            </div>
          </div>
          <div class="flex-1 overflow-y-auto custom-scrollbar pr-2">
            <ul id="txList" class="space-y-1"></ul>
          </div>
        </div>

        <div class="md:col-span-4 flex flex-col gap-6">
          
          <div class="bento-card bg-white border border-slate-200 p-6 flex-1 shadow-sm">
            <h3 class="text-slate-400 font-black uppercase text-[10px] tracking-widest mb-4 text-center">Distribuição</h3>
            <div class="h-40 relative flex justify-center items-center mb-6">
              <canvas id="donutChart"></canvas>
            </div>
            <ul id="legend" class="space-y-3"></ul>
          </div>

          <div class="bento-card bg-white border border-slate-200 p-6 shadow-sm">
            <h3 class="text-slate-400 font-black uppercase text-[10px] tracking-widest mb-6">Limites Mensais</h3>
            <div id="budgetList" class="space-y-4"></div>
          </div>

        </div>
      </div>

    </div>
  </main>

  <script src="app.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
